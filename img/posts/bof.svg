<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0f1a24"/>
      <stop offset="100%" stop-color="#05080c"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#g)"/>
  <g font-family="monospace" fill="#39ff14" opacity=".2" font-size="12">
    <text x="80" y="180">char buf[64];</text>
    <text x="80" y="210">strcpy(buf, argv[1]);</text>
    <text x="80" y="250">// no bounds check</text>
    <text x="80" y="300">AAAA AAAA AAAA AAAA AAAA AAAA AAAA AAAA</text>
    <text x="80" y="330">AAAA AAAA AAAA AAAA AAAA AAAA AAAA AAAA</text>
    <text x="80" y="360">BBBB BBBB ← saved RBP</text>
    <text x="80" y="390">0x4141414141414141 ← return addr</text>
  </g>
  <g transform="translate(1100,350)">
    <rect x="-120" y="-100" width="240" height="200" rx="4" fill="#000" fill-opacity=".6" stroke="#39ff14" stroke-width="1" opacity=".3"/>
    <text x="-100" y="-70" font-family="monospace" fill="#39ff14" font-size="12" opacity=".7">STACK</text>
    <text x="-100" y="-40" font-family="monospace" fill="#39ff14" font-size="11" opacity=".5">0x7fff....  ret addr</text>
    <text x="-100" y="-15" font-family="monospace" fill="#39ff14" font-size="11" opacity=".5">0x7fff....  saved rbp</text>
    <text x="-100" y="10" font-family="monospace" fill="#39ff14" font-size="11" opacity=".5">0x7fff....  buf[63]</text>
    <text x="-100" y="35" font-family="monospace" fill="#39ff14" font-size="11" opacity=".5">0x7fff....  buf[0]</text>
    <text x="-100" y="65" font-family="monospace" fill="#ffb020" font-size="11" opacity=".8">↑ overflow</text>
  </g>
</svg>
