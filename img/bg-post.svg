<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0f1a24"/>
      <stop offset="100%" stop-color="#05080c"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2a38" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity=".5"/>
  <g font-family="monospace" fill="#39ff14" opacity=".18" font-size="13">
    <text x="80" y="140">2026-06-13 09:12:01 INFO  [main] OwlEye blog v1.0</text>
    <text x="80" y="170">2026-06-13 09:12:02 DEBUG loading post...</text>
    <text x="80" y="200">2026-06-13 09:12:02 INFO  TLS 1.3 handshake ok</text>
    <text x="80" y="230">2026-06-13 09:12:03 INFO  GET /posts/2026-06-01 200</text>
    <text x="80" y="260">2026-06-13 09:12:03 INFO  CSP: default-src 'self'</text>
    <text x="80" y="290">2026-06-13 09:12:04 INFO  HSTS: max-age=63072000</text>
    <text x="80" y="320">2026-06-13 09:12:04 INFO  X-Content-Type-Options: nosniff</text>
    <text x="80" y="350">2026-06-13 09:12:05 INFO  Cache-Control: public, max-age=3600</text>
    <text x="80" y="380">2026-06-13 09:12:05 INFO  Content-Security-Policy: enforced</text>
    <text x="80" y="410">2026-06-13 09:12:06 INFO  Referrer-Policy: strict-origin</text>
    <text x="80" y="440">2026-06-13 09:12:06 INFO  Permissions-Policy: camera=(), mic=()</text>
    <text x="80" y="470">2026-06-13 09:12:07 INFO  Response served in 14ms</text>
  </g>
  <g transform="translate(1150,300)">
    <rect x="-140" y="-100" width="280" height="200" rx="4" fill="#000" fill-opacity=".6" stroke="#39ff14" stroke-width="1" opacity=".3"/>
    <text x="-120" y="-70" font-family="monospace" fill="#39ff14" font-size="12" opacity=".7">root@owleye:~#</text>
    <text x="-120" y="-45" font-family="monospace" fill="#39ff14" font-size="12" opacity=".7">cat /var/log/access.log</text>
    <text x="-120" y="-20" font-family="monospace" fill="#39ff14" font-size="12" opacity=".5">... 200 14ms ...</text>
    <text x="-120" y="10" font-family="monospace" fill="#39ff14" font-size="12" opacity=".7">_  _  _  _  _  _  _  _</text>
    <text x="-120" y="40" font-family="monospace" fill="#39ff14" font-size="12" opacity=".5">ready</text>
  </g>
</svg>
