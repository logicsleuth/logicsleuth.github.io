<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0f1a24"/>
      <stop offset="100%" stop-color="#05080c"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2a38" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity=".6"/>
  <g font-family="monospace" fill="#39ff14" opacity=".18" font-size="14">
    <text x="60" y="120">$ nmap -sV -p- target.local</text>
    <text x="60" y="150">$ whois owleye.io</text>
    <text x="60" y="180">$ openssl s_client -connect owleye.io:443</text>
    <text x="60" y="210">$ dig +short owleye.io</text>
    <text x="60" y="240">$ python3 exploit.py --target 10.0.0.1</text>
    <text x="60" y="270">$ strings malware.bin | grep -i c2</text>
    <text x="60" y="300">$ yara rules.yar /tmp/sample</text>
    <text x="60" y="330">$ volatility -f mem.raw pslist</text>
    <text x="60" y="360">$ tcpdump -i eth0 -w capture.pcap</text>
    <text x="60" y="390">$ john --wordlist=rockyou.txt hash.txt</text>
    <text x="60" y="420">$ sqlmap -u "http://t/?id=1" --dbs</text>
    <text x="60" y="450">$ ghidra --analyze binary.elf</text>
    <text x="60" y="480">$ objdump -d ./target | less</text>
    <text x="60" y="510">$ curl -X POST https://api/v1/submit</text>
    <text x="60" y="540">$ ssh -i key user@10.0.0.42</text>
    <text x="60" y="570">$ gpg --decrypt secret.gpg</text>
    <text x="60" y="600">$ binwalk -e firmware.bin</text>
    <text x="60" y="630">$ radare2 -A ./challenge</text>
    <text x="60" y="660">$ checksec --file=binary</text>
    <text x="60" y="690">$ python3 -c "import pwn; print('ok')"</text>
    <text x="60" y="720">$ sudo iptables -L -n -v</text>
    <text x="60" y="750">$ journalctl -u sshd --since today</text>
  </g>
  <circle cx="1200" cy="420" r="180" fill="none" stroke="#39ff14" stroke-width="1" opacity=".25"/>
  <circle cx="1200" cy="420" r="120" fill="none" stroke="#39ff14" stroke-width="1" opacity=".18"/>
  <circle cx="1200" cy="420" r="60" fill="#39ff14" opacity=".08"/>
  <text x="1120" y="430" font-family="monospace" fill="#39ff14" font-size="22" opacity=".7">&lt;OwlEye/&gt;</text>
</svg>
